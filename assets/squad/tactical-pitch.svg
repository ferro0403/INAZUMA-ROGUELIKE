    <path d="M388 262a126 126 0 0 0 224 0M388 1138a126 126 0 0 1 224 0"/>
    <circle cx="500" cy="210" r="7" fill="#efffe9"/>
    <circle cx="500" cy="1190" r="7" fill="#efffe9"/>
    <path d="M58 108a50 50 0 0 1 50-50M892 58a50 50 0 0 1 50 50M58 1292a50 50 0 0 0 50 50M892 1342a50 50 0 0 0 50-50"/>
